<h2 class="contributor">福沢 諭吉</h2>

<div class="topMargin1 textIndent0">
<h3 class="section" id="sec1">初編</h3>
</div>
<br>
<br>
<br>
<br>
<br>
<p>「天は人の上に人を造らず人の下に人を造らず」と言えり。されば天より人を生ずるには、万人は万人みな同じ位にして、生まれながら<ruby class="right">貴賤<rt>きせん</rt></ruby>上下の差別なく、万物の霊たる身と心との働きをもって天地の間にあるよろずの物を<ruby class="right">資<rt>と</rt></ruby>り、もって衣食住の用を達し、自由自在、互いに人の妨げをなさずしておのおの安楽にこの世を渡らしめ給うの趣意なり。されども今、広くこの人間世界を見渡すに、かしこき人あり、おろかなる人あり、貧しきもあり、富めるもあり、貴人もあり、下人もありて、その有様雲と<ruby class="right">泥<rt>どろ</rt></ruby>との相違あるに似たるはなんぞや。その次第はなはだ明らかなり。『<ruby class="right">実語教<rt>じつごきょう</rt></ruby>』に、「人学ばざれば智なし、智なき者は愚人なり」とあり。されば賢人と愚人との別は学ぶと学ばざるとによりてできるものなり。また世の中にむずかしき仕事もあり、やすき仕事もあり。そのむずかしき仕事をする者を身分重き人と名づけ、やすき仕事をする者を身分軽き人という。すべて心を用い、心配する仕事はむずかしくして、手足を用うる<ruby class="right">力役<rt>りきえき</rt></ruby>はやすし。ゆえに医者、学者、政府の役人、または大なる商売をする町人、あまたの奉公人を召し使う大百姓などは、身分重くして貴き者と言うべし。</p>
<p>　身分重くして貴ければおのずからその家も富んで、<ruby class="right">下々<rt>しもじも</rt></ruby>の者より見れば及ぶべからざるようなれども、その<ruby class="right">本<rt>もと</rt></ruby>を尋ぬればただその人に学問の力あるとなきとによりてその相違もできたるのみにて、天より定めたる約束にあらず。<ruby class="right">諺<rt>ことわざ</rt></ruby>にいわく、「天は富貴を人に与えずして、これをその人の働きに与うるものなり」と。されば前にも言えるとおり、人は生まれながらにして貴賤・貧富の別なし。ただ学問を勤めて物事をよく知る者は貴人となり富人となり、無学なる者は貧人となり<ruby class="right">下人<rt>げにん</rt></ruby>となるなり。</p>
<p>　学問とは、ただむずかしき字を知り、<ruby class="right">解<rt>げ</rt></ruby>し難き古文を読み、和歌を楽しみ、詩を作るなど、世上に実のなき文学を言うにあらず。これらの文学もおのずから人の心を<ruby class="right">悦<rt>よろこ</rt></ruby>ばしめずいぶん調法なるものなれども、古来、世間の儒者・和学者などの申すよう、さまであがめ<ruby class="right">貴<rt>とうと</rt></ruby>むべきものにあらず。古来、漢学者に世帯持ちの上手なる者も少なく、和歌をよくして商売に巧者なる町人もまれなり。これがため心ある町人・百姓は、その子の学問に出精するを見て、やがて身代を持ち崩すならんとて親心に心配する者あり。無理ならぬことなり。<ruby class="right">畢竟<rt>ひっきょう</rt></ruby>その学問の実に遠くして日用の間に合わぬ証拠なり。</p>
<p>　されば今、かかる実なき学問はまず次にし、もっぱら勤むべきは人間普通日用に近き実学なり。<ruby class="right">譬<rt>たと</rt></ruby>えば、いろは四十七文字を習い、手紙の<ruby class="right">文言<rt>もんごん</rt></ruby>、帳合いの仕方、<ruby class="right">算盤<rt>そろばん</rt></ruby>の稽古、<ruby class="right">天秤<rt>てんびん</rt></ruby>の取扱い等を心得、なおまた進んで学ぶべき箇条ははなはだ多し。地理学とは日本国中はもちろん世界万国の<ruby class="right">風土<rt>ふうど</rt></ruby>道案内なり。究理学とは天地万物の性質を見て、その働きを知る学問なり。歴史とは年代記のくわしきものにて万国古今の有様を詮索する書物なり。経済学とは一身一家の世帯より天下の世帯を説きたるものなり。修身学とは身の行ないを修め、人に交わり、この世を渡るべき天然の道理を述べたるものなり。</p>
<p>　これらの学問をするに、いずれも西洋の翻訳書を取り調べ、たいていのことは日本の仮名にて用を便じ、あるいは年少にして文才ある者へは横文字をも読ませ、一科一学も実事を押え、その事につきその物に従い、近く物事の道理を求めて今日の用を達すべきなり。右は人間普通の実学にて、人たる者は貴賤上下の区別なく、みなことごとくたしなむべき心得なれば、この心得ありて後に、士農工商おのおのその分を尽くし、銘々の家業を営み、身も独立し、家も独立し、天下国家も独立すべきなり。</p>
<p>　学問をするには分限を知ること肝要なり。人の天然生まれつきは、<ruby class="right">繋<rt>つな</rt></ruby>がれず縛られず、<ruby class="right">一人前<rt>いちにんまえ</rt></ruby>の男は男、一人前の女は女にて、自由自在なる者なれども、ただ自由自在とのみ唱えて<ruby class="right">分限<rt>ぶんげん</rt></ruby>を知らざればわがまま放蕩に陥ること多し。すなわちその分限とは、天の道理に基づき人の情に従い、他人の妨げをなさずしてわが一身の自由を達することなり。自由とわがままとの<ruby class="right">界<rt>さかい</rt></ruby>は、他人の妨げをなすとなさざるとの間にあり。<ruby class="right">譬<rt>たと</rt></ruby>えば自分の金銀を費やしてなすことなれば、たとい酒色に<ruby class="right">耽<rt>ふけ</rt></ruby>り放蕩を尽くすも自由自在なるべきに似たれども、けっして<ruby class="right">然<rt>しか</rt></ruby>らず、一人の放蕩は諸人の手本となり、ついに世間の風俗を乱りて人の教えに妨げをなすがゆえに、その費やすところの金銀はその人のものたりとも、その罪許すべからず。</p>
<p>　また自由独立のことは人の一身にあるのみならず、一国の上にもあることなり。わが日本はアジヤ州の東に離れたる一個の島国にて、古来外国と交わりを結ばず、ひとり自国の産物のみを衣食して不足と思いしこともなかりしが、嘉永年中アメリカ人渡来せしより外国<ruby class="right">交易<rt>こうえき</rt></ruby>のこと始まり、今日の有様に及びしことにて、開港の後もいろいろと議論多く、鎖国<ruby class="right">攘夷<rt>じょうい</rt></ruby>などとやかましく言いし者もありしかども、その見るところはなはだ狭く、<ruby class="right">諺<rt>ことわざ</rt></ruby>に言う「井の底の<ruby class="right">蛙<rt>かわず</rt></ruby>」にて、その議論とるに足らず。日本とても西洋諸国とても同じ天地の間にありて、同じ日輪に照らされ、同じ月を眺め、海をともにし、空気をともにし、情合い相同じき人民なれば、ここに余るものは彼に渡し、彼に余るものは我に取り、互いに相教え互いに相学び、恥ずることもなく誇ることもなく、互いに便利を達し互いにその幸いを祈り、天理人道に従いて互いの交わりを結び、理のためにはアフリカの<ruby class="right">黒奴<rt>こくど</rt></ruby>にも恐れ入り、道のためにはイギリス・アメリカの軍艦をも恐れず、国の恥辱とありては日本国中の人民一人も残らず命を<ruby class="right">棄<rt>す</rt></ruby>てて国の威光を落とさざるこそ、一国の自由独立と申すべきなり。</p>
<p>　しかるを支那人などのごとく、わが国よりほかに国なきごとく、外国の人を見ればひとくちに<ruby class="right">夷狄<rt>いてき</rt></ruby>夷狄と唱え、四足にてあるく畜類のようにこれを<ruby class="right">賤<rt>いや</rt></ruby>しめこれを<ruby class="right">嫌<rt>きら</rt></ruby>い、自国の力をも計らずしてみだりに外国人を追い払わんとし、かえってその夷狄に<ruby class="right">窘<rt>くる</rt></ruby>しめらるるなどの始末は、実に国の分限を知らず、一人の身の上にて言えば天然の自由を達せずしてわがまま放蕩に陥る者と言うべし。王制<ruby class="right">一度<rt>ひとたび</rt></ruby>新たなりしより以来、わが日本の政風大いに改まり、外は万国の公法をもって外国に交わり、内は人民に自由独立の趣旨を示し、すでに平民へ<ruby class="right">苗字<rt>みょうじ</rt></ruby>・乗馬を許せしがごときは<ruby class="right">開闢<rt>かいびゃく</rt></ruby>以来の一<ruby class="right">美事<rt>びじ</rt></ruby>、士農工商四民の位を一様にするの<ruby class="right">基<rt>もとい</rt></ruby>ここに定まりたりと言うべきなり。</p>
<p>　されば今より後は日本国中の人民に、生まれながらその身につきたる位などと申すはまずなき姿にて、ただその人の才徳とその<ruby class="right">居処<rt>きょしょ</rt></ruby>とによりて位もあるものなり。たとえば政府の官吏を粗略にせざるは当然のことなれども、こはその人の身の貴きにあらず、その人の才徳をもってその役儀を勤め、国民のために貴き国法を取り扱うがゆえにこれを貴ぶのみ。人の貴きにあらず、国法の貴きなり。旧幕府の時代、東海道にお茶壺の通行せしは、みな人の知るところなり。そのほか御用の<ruby class="right">鷹<rt>たか</rt></ruby>は人よりも貴く、御用の馬には往来の旅人も路を避くる等、すべて御用の二字を付くれば、石にても<ruby class="right">瓦<rt>かわら</rt></ruby>にても恐ろしく貴きもののように見え、世の中の人も数千百年の<ruby class="right">古<rt>いにしえ</rt></ruby>よりこれを嫌いながらまた自然にその<ruby class="right">仕来<rt>しきた</rt></ruby>りに慣れ、上下互いに見苦しき風俗を成せしことなれども、畢竟これらはみな法の貴きにもあらず、品物の貴きにもあらず、ただいたずらに政府の威光を張り人を<ruby class="right">畏<rt>おど</rt></ruby>して人の自由を妨げんとする卑怯なる仕方にて、実なき虚威というものなり。今日に至りてはもはや全日本国内にかかる浅ましき制度、風俗は絶えてなきはずなれば、人々安心いたし、かりそめにも政府に対して不平をいだくことあらば、これを包みかくして暗に<ruby class="right">上<rt>かみ</rt></ruby>を<ruby class="right">怨<rt>うら</rt></ruby>むることなく、その路を求め、その筋により静かにこれを訴えて遠慮なく議論すべし。天理人情にさえ叶うことならば、一命をも<ruby class="right">抛<rt>なげう</rt></ruby>ちて争うべきなり。これすなわち一国人民たる者の分限と申すものなり。</p>
<p>　前条に言えるとおり、人の一身も一国も、天の道理に基づきて<ruby class="right">不覊<rt>ふき</rt></ruby>自由なるものなれば、もしこの一国の自由を妨げんとする者あらば世界万国を敵とするも恐るるに足らず、この一身の自由を妨げんとする者あらば政府の官吏も<ruby class="right">憚<rt>はばか</rt></ruby>るに足らず。ましてこのごろは四民同等の基本も立ちしことなれば、いずれも安心いたし、ただ天理に従いて存分に事をなすべしとは申しながら、およそ人たる者はそれぞれの身分あれば、またその身分に従い相応の才徳なかるべからず。身に才徳を備えんとするには物事の理を知らざるべからず。物事の理を知らんとするには字を学ばざるべからず。これすなわち学問の急務なるわけなり。</p>
<p>　昨今の有様を見るに、農工商の三民はその身分以前に百倍し、やがて士族と肩を並ぶるの勢いに至り、今日にても三民のうちに人物あれば政府の上に採用せらるべき道すでに開けたることなれば、よくその身分を顧み、わが身分を重きものと思い、卑劣の所行あるべからず。およそ世の中に無知文盲の民ほど<ruby class="right">憐<rt>あわ</rt></ruby>れむべくまた<ruby class="right">悪<rt>にく</rt></ruby>むべきものはあらず。智恵なきの<ruby class="right">極<rt>きわ</rt></ruby>みは恥を知らざるに至り、<ruby class="right">己<rt>おの</rt></ruby>が無智をもって貧窮に陥り飢寒に迫るときは、己が身を罪せずしてみだりに<ruby class="right">傍<rt>かたわら</rt></ruby>の富める人を怨み、はなはだしきは徒党を結び<ruby class="right">強訴<rt>ごうそ</rt></ruby>・<ruby class="right">一揆<rt>いっき</rt></ruby>などとて乱暴に及ぶことあり。恥を知らざるとや言わん、法を恐れずとや言わん。天下の<ruby class="right">法度<rt>ほうど</rt></ruby>を頼みてその身の安全を保ち、その家の渡世をいたしながら、その頼むところのみを頼みて、己が私欲のためにはまたこれを破る、前後不都合の次第ならずや。あるいはたまたま<ruby class="right">身本<rt>みもと</rt></ruby><ruby class="right">慥<rt>たし</rt></ruby>かにして相応の身代ある者も、金銭を<ruby class="right">貯<rt>たくわ</rt></ruby>うることを知りて子孫を教うることを知らず。教えざる子孫なればその愚なるもまた怪しむに足らず。ついには遊惰放蕩に流れ、先祖の家督をも一朝の煙となす者少なからず。</p>
<p>　かかる愚民を支配するにはとても道理をもって<ruby class="right">諭<rt>さと</rt></ruby>すべき方便なければ、ただ威をもって<ruby class="right">畏<rt>おど</rt></ruby>すのみ。西洋の<ruby class="right">諺<rt>ことわざ</rt></ruby>に「愚民の上に<ruby class="right">苛<rt>から</rt></ruby>き政府あり」とはこのことなり。こは政府の苛きにあらず、愚民のみずから招く<ruby class="right">災<rt>わざわい</rt></ruby>なり。愚民の上に苛き政府あれば、良民の上には良き政府あるの理なり。ゆえに今わが日本国においてもこの人民ありてこの政治あるなり。仮りに人民の徳義今日よりも衰えてなお無学文盲に沈むことあらば、政府の法も今一段厳重になるべく、もしまた、人民みな学問に志して、物事の理を知り、文明の風に<ruby class="right">赴<rt>おもむ</rt></ruby>くことあらば、政府の法もなおまた寛仁大度の場合に及ぶべし。法の<ruby class="right">苛<rt>から</rt></ruby>きと<ruby class="right">寛<rt>ゆる</rt></ruby>やかなるとは、ただ人民の徳不徳によりておのずから加減あるのみ。人誰か苛政を好みて良政を<ruby class="right">悪<rt>にく</rt></ruby>む者あらん、誰か本国の富強を祈らざる者あらん、誰か外国の侮りを甘んずる者あらん、これすなわち人たる者の常の情なり。今の世に生まれ報国の心あらん者は、必ずしも身を苦しめ思いを焦がすほどの心配あるにあらず。ただその大切なる目当ては、この人情に基づきてまず一身の行ないを正し、厚く学に志し、<ruby class="right">博<rt>ひろ</rt></ruby>く事を知り、銘々の身分に相応すべきほどの智徳を備えて、政府はその<ruby class="right">政<rt>まつりごと</rt></ruby>を施すに<ruby class="right">易<rt>やす</rt></ruby>く、諸民はその支配を受けて苦しみなきよう、互いにその所を得てともに全国の太平を護らんとするの一事のみ。今余輩の勧むる学問ももっぱらこの一事をもって趣旨とせり。</p>

<h4 class="subsection" id="sec2"><ruby class="right">端書<rt>はしがき</rt></ruby></h4>

<br>
<p>　このたび余輩の故郷中津に学校を開くにつき、学問の趣意を記して<ruby class="right">旧<rt>ふる</rt></ruby>く交わりたる同郷の友人へ示さんがため一冊を綴りしかば、或る人これを見ていわく、「この冊子をひとり中津の人へのみ示さんより、広く世間に布告せばその益もまた広かるべし」との勧めにより、すなわち慶応義塾の活字版をもってこれを<ruby class="right">摺<rt>す</rt></ruby>り、同志の一覧に供うるなり。</p>
